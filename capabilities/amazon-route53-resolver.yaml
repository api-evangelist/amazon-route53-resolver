naftiko: 1.0.0-alpha1
info:
  label: Amazon Route53 Resolver Operations
  description: Workflow capability for Amazon Route53 Resolver. Enables automation of Amazon Route53 Resolver resources for cloud operations teams.
  tags:
  - Amazon Route53 Resolver
  - AWS
  - Cloud Operations
  created: '2026-04-19'
  modified: '2026-04-19'
binds:
- namespace: env
  keys:
    AWS_ACCESS_KEY: AWS_ACCESS_KEY
    AWS_SECRET_KEY: AWS_SECRET_KEY
capability:
  consumes:
  - import: amazon-route53-resolver
    location: ./shared/amazon-route53-resolver.yaml
  exposes:
  - type: rest
    port: 8080
    namespace: amazon-route53-resolver-api
    description: Unified REST API for Amazon Route53 Resolver operations.
    resources:
    - path: /v1/resources
      name: resources
      description: Amazon Route53 Resolver resources
      operations:
      - method: GET
        name: list-resources
        description: List Amazon Route53 Resolver resources
        outputParameters:
        - type: object
          mapping: $.
  - type: mcp
    port: 9090
    namespace: amazon-route53-resolver-mcp
    transport: http
    description: MCP server for AI-assisted Amazon Route53 Resolver operations.
    tools:
    - name: list-amazon-route53-resolver-resources
      description: List Amazon Route53 Resolver resources
      hints:
        readOnly: true
      outputParameters:
      - type: object
        mapping: $.
