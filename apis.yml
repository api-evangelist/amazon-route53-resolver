name: Amazon Route 53 Resolver
description: Amazon Route 53 Resolver provides DNS resolution for hybrid cloud environments, enabling DNS queries between your VPCs and on-premises networks. It allows you to configure DNS forwarding 
  rules, manage resolver endpoints, and set up conditional forwarding to resolve domain names across your hybrid infrastructure seamlessly.
image: https://a0.awsstatic.com/libra-css/images/logos/aws_logo_smile_1200x630.png
url: https://raw.githubusercontent.com/api-evangelist/amazon-route53-resolver/refs/heads/main/apis.yml
created: '2024-01-15'
modified: '2026-04-19'
apis:
- name: Amazon Route 53 Resolver API
  description: >-
    The Amazon Route 53 Resolver API provides programmatic access to manage DNS
    resolution across hybrid cloud environments. It enables developers to create
    and manage resolver endpoints, configure forwarding rules, associate VPCs
    with resolver rules, and manage DNS firewall rule groups for filtering DNS
    queries.
  image: https://a0.awsstatic.com/libra-css/images/logos/aws_logo_smile_1200x630.png
  humanURL: https://aws.amazon.com/route53/
  baseURL: https://route53resolver.amazonaws.com
  tags:
  - AWS
  - DNS
  - Hybrid Cloud
  - Networking
  properties:
  - type: Documentation
    url: https://docs.aws.amazon.com/Route53/latest/DeveloperGuide/resolver.html
  - type: OpenAPI
    url: openapi/amazon-route53-resolver-openapi.yml
  - type: Pricing
    url: https://aws.amazon.com/route53/pricing/
  - type: GettingStarted
    url: https://aws.amazon.com/route53/getting-started/
  - type: FAQ
    url: https://aws.amazon.com/route53/faqs/
