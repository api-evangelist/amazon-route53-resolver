apis:
- name: Amazon Route 53 Resolver API
  description: >-
    The Amazon Route 53 Resolver API provides programmatic access to manage DNS
    resolution across hybrid cloud environments. It enables developers to create
    and manage resolver endpoints, configure forwarding rules, associate VPCs
    with resolver rules, and manage DNS firewall rule groups for filtering DNS
    queries.
