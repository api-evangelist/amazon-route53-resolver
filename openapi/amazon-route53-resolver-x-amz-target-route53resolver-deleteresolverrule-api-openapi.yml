tags:
- name: '#X Amz Target=Route53Resolver.DeleteResolverRule'
paths:
  /#X-Amz-Target=Route53Resolver.DeleteResolverRule:
    parameters:
    - $ref: '#/components/parameters/X-Amz-Content-Sha256'
    - $ref: '#/components/parameters/X-Amz-Date'
    - $ref: '#/components/parameters/X-Amz-Algorithm'
    - $ref: '#/components/parameters/X-Amz-Credential'
    - $ref: '#/components/parameters/X-Amz-Security-Token'
    - $ref: '#/components/parameters/X-Amz-Signature'
    - $ref: '#/components/parameters/X-Amz-SignedHeaders'
    post:
      operationId: DeleteResolverRule
      description: Deletes a Resolver rule. Before you can delete a Resolver rule, you must disassociate it from all the VPCs that you associated the Resolver rule with. For more information, see <a href="https://docs.aws.amazon.com/Route53/latest/APIReference/API_route53resolver_DisassociateResolverRule.html">DisassociateResolverRule</a>.
      responses:
        '200':
          description: Success
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/DeleteResolverRuleResponse'
        '480':
          description: InvalidParameterException
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/InvalidParameterException'
        '481':
          description: ResourceNotFoundException
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ResourceNotFoundException'
        '482':
          description: ResourceInUseException
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ResourceInUseException'
        '483':
          description: InternalServiceErrorException
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/InternalServiceErrorException'
        '484':
          description: ThrottlingException
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ThrottlingException'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/DeleteResolverRuleRequest'
      parameters:
      - name: X-Amz-Target
        in: header
        required: true
        schema:
          type: string
          enum:
          - Route53Resolver.DeleteResolverRule
      tags:
      - '#X Amz Target=Route53Resolver.DeleteResolverRule'
components:
  schemas:
    ResourceNotFoundException: {}
    Ipv6:
      type: string
      minLength: 7
      maxLength: 39
    Arn:
      type: string
      minLength: 1
      maxLength: 255
    ThrottlingException: {}
    TargetAddress:
      type: object
      properties:
        Ip:
          allOf:
          - $ref: '#/components/schemas/Ip'
          - description: One IPv4 address that you want to forward DNS queries to.
        Port:
          allOf:
          - $ref: '#/components/schemas/Port'
          - description: The port at <code>Ip</code> that you want to forward DNS queries to.
        Ipv6:
          allOf:
          - $ref: '#/components/schemas/Ipv6'
          - description: ' One IPv6 address that you want to forward DNS queries to. '
      description: In a <a href="https://docs.aws.amazon.com/Route53/latest/APIReference/API_route53resolver_CreateResolverRule.html">CreateResolverRule</a> request, an array of the IPs that you want to forward DNS queries to.
    ResourceInUseException: {}
    InvalidParameterException: {}
    Ip:
      type: string
      minLength: 7
      maxLength: 36
    ResourceId:
      type: string
      minLength: 1
      maxLength: 64
    InternalServiceErrorException: {}
    ResolverRuleStatus:
      type: string
      enum:
      - COMPLETE
      - DELETING
      - UPDATING
      - FAILED
    StatusMessage:
      type: string
      maxLength: 255
    DeleteResolverRuleRequest:
      type: object
      required:
      - ResolverRuleId
      title: DeleteResolverRuleRequest
      properties:
        ResolverRuleId:
          allOf:
          - $ref: '#/components/schemas/ResourceId'
          - description: The ID of the Resolver rule that you want to delete.
    AccountId:
      type: string
      minLength: 12
      maxLength: 32
    Port:
      type: integer
      minimum: 0
      maximum: 65535
    RuleTypeOption:
      type: string
      enum:
      - FORWARD
      - SYSTEM
      - RECURSIVE
    DomainName:
      type: string
      minLength: 1
      maxLength: 256
    DeleteResolverRuleResponse:
      type: object
      properties:
        ResolverRule:
          allOf:
          - $ref: '#/components/schemas/ResolverRule'
          - description: Information about the <code>DeleteResolverRule</code> request, including the status of the request.
    ShareStatus:
      type: string
      enum:
      - NOT_SHARED
      - SHARED_WITH_ME
      - SHARED_BY_ME
    Name:
      type: string
      pattern: (?!^[0-9]+$)([a-zA-Z0-9\-_' ']+)
      maxLength: 64
    Rfc3339TimeString:
      type: string
      minLength: 20
      maxLength: 40
    CreatorRequestId:
      type: string
      minLength: 1
      maxLength: 255
    ResolverRule:
      type: object
      properties:
        Id:
          allOf:
          - $ref: '#/components/schemas/ResourceId'
          - description: The ID that Resolver assigned to the Resolver rule when you created it.
        CreatorRequestId:
          allOf:
          - $ref: '#/components/schemas/CreatorRequestId'
          - description: 'A unique string that you specified when you created the Resolver rule. <code>CreatorRequestId</code> identifies the request and allows failed requests to be retried without the risk of running the operation twice. '
        Arn:
          allOf:
          - $ref: '#/components/schemas/Arn'
          - description: The ARN (Amazon Resource Name) for the Resolver rule specified by <code>Id</code>.
        DomainName:
          allOf:
          - $ref: '#/components/schemas/DomainName'
          - description: DNS queries for this domain name are forwarded to the IP addresses that are specified in <code>TargetIps</code>. If a query matches multiple Resolver rules (example.com and www.example.com), the query is routed using the Resolver rule that contains the most specific domain name (www.example.com).
        Status:
          allOf:
          - $ref: '#/components/schemas/ResolverRuleStatus'
          - description: A code that specifies the current status of the Resolver rule.
        StatusMessage:
          allOf:
          - $ref: '#/components/schemas/StatusMessage'
          - description: A detailed description of the status of a Resolver rule.
        RuleType:
          allOf:
          - $ref: '#/components/schemas/RuleTypeOption'
          - description: <p>When you want to forward DNS queries for specified domain name to resolvers on your network, specify <code>FORWARD</code>.</p> <p>When you have a forwarding rule to forward DNS queries for a domain to your network and you want Resolver to process queries for a subdomain of that domain, specify <code>SYSTEM</code>.</p> <p>For example, to forward DNS queries for example.com to resolvers on your network, you create a rule and specify <code>FORWARD</code> for <code>RuleType</code>. To then have Resolver process queries for apex.example.com, you create a rule and specify <code>SYSTEM</code> for <code>RuleType</code>.</p> <p>Currently, only Resolver can create rules that have a value of <code>RECURSIVE</code> for <code>RuleType</code>.</p>
        Name:
          allOf:
          - $ref: '#/components/schemas/Name'
          - description: The name for the Resolver rule, which you specified when you created the Resolver rule.
        TargetIps:
          allOf:
          - $ref: '#/components/schemas/TargetList'
          - description: An array that contains the IP addresses and ports that an outbound endpoint forwards DNS queries to. Typically, these are the IP addresses of DNS resolvers on your network. Specify IPv4 addresses. IPv6 is not supported.
        ResolverEndpointId:
          allOf:
          - $ref: '#/components/schemas/ResourceId'
          - description: The ID of the endpoint that the rule is associated with.
        OwnerId:
          allOf:
          - $ref: '#/components/schemas/AccountId'
          - description: When a rule is shared with another Amazon Web Services account, the account ID of the account that the rule is shared with.
        ShareStatus:
          allOf:
          - $ref: '#/components/schemas/ShareStatus'
          - description: Whether the rule is shared and, if so, whether the current account is sharing the rule with another account, or another account is sharing the rule with the current account.
        CreationTime:
          allOf:
          - $ref: '#/components/schemas/Rfc3339TimeString'
          - description: The date and time that the Resolver rule was created, in Unix time format and Coordinated Universal Time (UTC).
        ModificationTime:
          allOf:
          - $ref: '#/components/schemas/Rfc3339TimeString'
          - description: The date and time that the Resolver rule was last updated, in Unix time format and Coordinated Universal Time (UTC).
      description: For queries that originate in your VPC, detailed information about a Resolver rule, which specifies how to route DNS queries out of the VPC. The <code>ResolverRule</code> parameter appears in the response to a <a href="https://docs.aws.amazon.com/Route53/latest/APIReference/API_route53resolver_CreateResolverRule.html">CreateResolverRule</a>, <a href="https://docs.aws.amazon.com/Route53/latest/APIReference/API_route53resolver_DeleteResolverRule.html">DeleteResolverRule</a>, <a href="https://docs.aws.amazon.com/Route53/latest/APIReference/API_route53resolver_GetResolverRule.html">GetResolverRule</a>, <a href="https://docs.aws.amazon.com/Route53/latest/APIReference/API_route53resolver_ListResolverRules.html">ListResolverRules</a>, or <a href="https://docs.aws.amazon.com/Route53/latest/APIReference/API_route53resolver_UpdateResolverRule.html">UpdateResolverRule</a> request.
    TargetList:
      type: array
      items:
        $ref: '#/components/schemas/TargetAddress'
      minItems: 1
